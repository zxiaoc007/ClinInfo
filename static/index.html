<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Assistant - Clinical Trials & Drugs@FDA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1>Medical Assistant</h1>
                </div>
                <button class="clear-btn" id="clearBtn" title="Clear conversation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 6H5H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6H19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Clear
                </button>
            </div>
            <div class="tabs-container">
                <button class="tab-btn active" data-mode="trials" id="tabTrials">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Clinical Trials
                </button>
                <button class="tab-btn" data-mode="drugs" id="tabDrugs">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Drugs@FDA
                </button>
            </div>
        </header>

        <main>
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message" id="welcomeMessageTrials">
                    <div class="welcome-icon">👋</div>
                    <h2>Welcome to Clinical Trials Assistant</h2>
                    <p>I can help you find clinical trials from ClinicalTrials.gov. Try asking:</p>
                    <div class="example-queries">
                        <button class="example-btn" data-query="Find phase 3 breast cancer studies">Find phase 3 breast cancer studies</button>
                        <button class="example-btn" data-query="Are there recruiting diabetes trials?">Are there recruiting diabetes trials?</button>
                        <button class="example-btn" data-query="Find recent cancer trials from the last month">Find recent cancer trials from the last month</button>
                        <button class="example-btn" data-query="Search for Alzheimer's trials in New York">Search for Alzheimer's trials in New York</button>
                    </div>
                </div>
                <div class="welcome-message" id="welcomeMessageDrugs" style="display: none;">
                    <div class="welcome-icon">💊</div>
                    <h2>Welcome to Drugs@FDA Assistant</h2>
                    <p>I can help you find drug information from the FDA database. Try asking:</p>
                    <div class="example-queries">
                        <button class="example-btn" data-query="Search for information about ibuprofen">Search for information about ibuprofen</button>
                        <button class="example-btn" data-query="Find drug information for Advil">Find drug information for Advil</button>
                        <button class="example-btn" data-query="What are the warnings for acetaminophen?">What are the warnings for acetaminophen?</button>
                        <button class="example-btn" data-query="Search for diabetes medications">Search for diabetes medications</button>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Ask about clinical trials..." 
                        rows="1"
                        maxlength="1000"
                    ></textarea>
                    <button id="sendBtn" class="send-btn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="char-count"><span id="charCount">0</span>/1000</span>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
